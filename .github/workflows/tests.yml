name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Generate demo artifacts
        run: python scripts/create_demo_artifacts.py
      - name: Run hardening tests
        run: python tests/test_hardening.py
      - name: Evaluate demo output
        run: python scripts/evaluate_output.py sample_output/ecr_results_demo.xlsx --out sample_output/evaluation_report_demo.md
